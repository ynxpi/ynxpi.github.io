<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ynxpi | Home</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* Modernized Dark Red & Super Black Theme */
        :root {
            --bg-black: #030000; /* Slightly lifted off pure black for better contrast */
            --accent-red: #d90000;
            --accent-glow: #ff1a1a;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --nav-height: 75px;
        }

        body {
            /* Added a subtle radial gradient for depth */
            background: radial-gradient(circle at 50% 30%, #1a0000 0%, var(--bg-black) 70%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden; 
        }

        /* Glassmorphism Top Navigation */
        nav {
            height: var(--nav-height);
            background-color: rgba(3, 0, 0, 0.6);
            backdrop-filter: blur(12px); /* Creates the frosted glass effect */
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .logo span {
            color: var(--accent-red);
            text-shadow: 0 0 15px rgba(217, 0, 0, 0.4);
        }

        .logo:hover {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Animated underline hover effect */
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-red);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-red);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        /* Hero Section with Entrance Animation */
        .hero {
            height: calc(100vh - var(--nav-height));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            animation: fadeUp 1s ease-out forwards; /* Applied animation */
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            margin: 0;
            color: var(--text-main);
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(217, 0, 0, 0.3);
            line-height: 1;
        }

        .divider {
            width: 0px;
            height: 3px;
            background: var(--accent-red);
            margin: 30px 0;
            border-radius: 5px;
            box-shadow: 0 0 15px var(--accent-red);
            animation: expandLine 1s ease-out 0.5s forwards;
        }

        .hero p {
            color: var(--text-dim);
            max-width: 550px;
            font-size: 1.15rem;
            font-weight: 400;
            margin-bottom: 40px;
        }

        /* Modernized Call to Action Button */
        .cta-btn {
            padding: 14px 35px;
            background: transparent;
            border: 1px solid var(--accent-red);
            border-radius: 4px; /* Slight rounding looks more modern */
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .cta-btn:hover {
            background: var(--accent-red);
            color: #fff;
            box-shadow: 0 0 25px rgba(217, 0, 0, 0.6);
            transform: translateY(-3px);
            border-color: var(--accent-glow);
        }

        footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: #555; /* Lightened so it's readable */
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Keyframe Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandLine {
            to {
                width: 80px;
            }
        }

        /* Basic Mobile Responsiveness */
        @media (max-width: 768px) {
            .nav-links { display: none; /* Hide links on mobile for now */ }
            .hero p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">ynx<span>pi</span></a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="games.html">Games</a>
            <a href="apps.html">Apps</a>
            <a href="tools.html">Tools</a>
        </div>
    </nav>

    <div class="hero">
        <h1>ynxpi</h1>
        <div class="divider"></div>
        <p>A quiet corner of the web for personal projects, small games, and digital tools.</p>
        
        <a href="games.html" class="cta-btn">Enter the Games</a>
    </div>

    <footer>
        &copy; 2026 YNXPI • LO-FI DIGITAL HUB
    </footer>

</body>
</html>
