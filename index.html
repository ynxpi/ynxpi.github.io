<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ynxpi | Home</title>
    <style>
        /* Dark Red & Super Black Theme */
        :root {
            --bg-black: #000000;
            --accent-red: #8b0000;
            --accent-bright: #ff0000;
            --text-main: #ffffff;
            --text-dim: #666666;
            --nav-height: 70px;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow: hidden; /* Keeps the home page feeling tight and cinematic */
        }

        /* Top Navigation Bar */
        nav {
            height: var(--nav-height);
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #111;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-red);
            text-decoration: none;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        /* Hover effect for links */
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-red);
        }

        /* Hero Section */
        .hero {
            height: calc(100vh - var(--nav-height));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem); /* Responsive sizing */
            margin: 0;
            color: var(--text-main);
            font-weight: 900;
            letter-spacing: -3px;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
        }

        .hero p {
            color: var(--text-dim);
            max-width: 500px;
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: var(--accent-red);
            margin: 20px 0;
            box-shadow: 0 0 15px var(--accent-red);
        }

        /* Call to Action Button */
        .cta-btn {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        .cta-btn:hover {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 0 20px var(--accent-red);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #1a1a1a;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">ynxpi</a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="games.html">Games</a>
            <a href="apps.html">Apps</a>
            <a href="tools.html">Tools</a>
        </div>
    </nav>

    <div class="hero">
        <h1>ynxpi</h1>
        <div class="divider"></div>
        <p>A quiet corner of the web for personal projects, small games, and digital tools.</p>
        
        <a href="games.html" class="cta-btn">Enter the Games</a>
    </div>

    <footer>
        &copy; 2026 YNXPI • LO-FI DIGITAL HUB
    </footer>

</body>
</html>
